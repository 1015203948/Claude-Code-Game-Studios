# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: cross_scene_direct_reference
    status: active
    description: "禁止在场景间直接引用其他场景的 GameObject 或 Component（Unity 场景生命周期导致引用在场景卸载时变为 null）"
    instead: "使用 ScriptableObject Channel 广播事件，或通过 MasterScene 持有的 ShipDataModel 共享数据"
    adr: docs/architecture/adr-0001-scene-management-architecture.md
    added: 2026-04-14

  - pattern: camera_setactive
    status: active
    description: "禁止对摄像机 GameObject 使用 SetActive(false/true) 进行可见性切换"
    instead: "使用 Camera.enabled = false/true；SetActive 会导致 URP 执行无效 Culling Pass 产生报错"
    adr: docs/architecture/adr-0001-scene-management-architecture.md
    added: 2026-04-14

  - pattern: unity_event_for_gameplay
    status: active
    description: "禁止使用 UnityEvent<T> 替代 C# event Action<T> 作为游戏系统间通信机制"
    instead: "跨场景通信使用 ScriptableObject Channel（Tier 1）；同场景跨系统通信使用 C# event Action<T>（Tier 2）"
    why: "UnityEvent<T> 使用反射调用，移动端帧预算（16.6ms）不可接受其性能开销；序列化的 PersistentCall 在场景重载时容易产生悬空引用，违反 ADR-0001 cross_scene_direct_reference 禁令"
    adr: docs/architecture/adr-0002-event-communication-architecture.md
    added: 2026-04-14

  - pattern: static_event_bus
    status: active
    description: "禁止使用全局静态或 Singleton MessageBus（字符串 key 发布/订阅）作为系统间通信机制"
    instead: "跨场景通信使用 ScriptableObject Channel；同场景跨系统通信使用 C# event Action<T>"
    why: "字符串 key 无类型安全，运行时错误难以追踪；Singleton 耦合违反 ADR-0001 风险 R-3（Singleton 蔓延）；事件追踪困难"
    adr: docs/architecture/adr-0002-event-communication-architecture.md
    added: 2026-04-14

  - pattern: so_runtime_mutation
    status: active
    description: "禁止在运行时对 ScriptableObject 字段赋值（如 ResourceConfig.OreCap = x）"
    instead: "运行时状态使用 GameDataManager 持有的普通 C# class 对象；SO 只在 Editor Inspector 中编辑"
    why: "SO 运行时修改会持久化到磁盘（Editor 模式下），PlayMode 退出后改动保留，导致数据污染和难以复现的测试 bug"
    adr: docs/architecture/adr-0004-data-model-architecture.md
    added: 2026-04-14
    status: active
    description: "禁止使用 Unity Legacy Input Manager（`Input.*` 静态类）作为输入处理机制"
    instead: "使用 New Input System（com.unity.inputsystem@1.11）；InputActionAsset 定义 StarMapActions / CockpitActions 两个 ActionMap；多点触控使用 EnhancedTouchSupport"
    why: "Unity 6.3 LTS 中 Legacy Input Manager 已弃用；New Input System 提供强类型 Action、可重新绑定、ActionMap 上下文切换，移动端性能更优"
    adr: docs/architecture/adr-0003-input-system-architecture.md
    added: 2026-04-14

  - pattern: velocity_direct_write
    status: active
    description: "禁止直接写入 Rigidbody.velocity（如 rb.velocity = Vector3.zero）"
    instead: "使用 Rigidbody.AddForce() 施加反向力，或使用 Speed Clamp 软上限机制（P-2）"
    why: "直接写入 velocity 会破坏物理引擎的稳定性；Unity 6 物理引擎推荐使用 AddForce 代替直接写入；软上限速度钳制使用反向 AddForce 而非硬截断"
    adr: docs/architecture/adr-0018-ship-control-system-architecture.md
    added: 2026-04-15

  - contract: fire_requested
    status: active
    pattern: signal  # C# event Action<T>
    producer: ShipControlSystem
    consumers:
      - CombatSystem
    adr: docs/architecture/adr-0018-ship-control-system-architecture.md
    signal_signature: "ShipControlSystem.FireRequested(playerInstanceId, enemyInstanceId) — aimAngle ≤ FIRE_ANGLE_THRESHOLD 时触发"
    notes: "AimAngle 由 ShipControlSystem 每帧计算（规则 L-2）；CombatSystem 订阅此事件执行 Raycast 命中检测"
    referenced_by:
      - docs/architecture/adr-0018-ship-control-system-architecture.md
    added: 2026-04-15
    revised: ""

  - contract: lock_status_changed
    status: active
    pattern: signal  # C# event Action<T>
    producer: ShipControlSystem
    consumers:
      - ShipHUD
    adr: docs/architecture/adr-0018-ship-control-system-architecture.md
    signal_signature: "ShipControlSystem.OnLockAcquired(targetId)；ShipControlSystem.OnLockLost(targetId)"
    notes: "OnLockAcquired 在 aimAngle ≤ FIRE_ANGLE_THRESHOLD 且 SoftLockTarget 有效时触发；OnLockLost 在 aimAngle > FIRE_ANGLE_THRESHOLD 或目标离开 LOCK_RANGE 时触发"
    referenced_by:
