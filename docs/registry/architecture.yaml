# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: cross_scene_events
    status: active
    pattern: event_bus  # ScriptableObject Channel
    producer: any-system
    consumers:
      - star-map-ui     # subscribes OnViewLayerChanged to show/hide
      - ship-hud        # subscribes OnViewLayerChanged to hide Canvas when STARMAP
      - ship-control-system  # subscribes to activate/deactivate input handling
    adr: docs/architecture/adr-0001-scene-management-architecture.md
    signal_signature: "ViewLayerChannel.OnViewLayerChanged(ViewLayer newLayer)"
    notes: "ALL cross-scene communication must use ScriptableObject Channel or MasterScene data model. Direct cross-scene GameObject references are FORBIDDEN."
    referenced_by:
      - docs/architecture/adr-0001-scene-management-architecture.md
    added: 2026-04-14
    revised: ""

  - contract: cockpit_enter
    status: active
    pattern: direct_call
    producer: star-map-ui
    consumers:
      - ViewLayerManager
    adr: docs/architecture/adr-0001-scene-management-architecture.md
    signal_signature: "ViewLayerManager.RequestEnterCockpit(string shipId)"
    referenced_by:
      - docs/architecture/adr-0001-scene-management-architecture.md
    added: 2026-04-14
    revised: ""

  - contract: cockpit_exit
    status: active
    pattern: direct_call
    producer: ship-hud
    consumers:
      - ViewLayerManager
    adr: docs/architecture/adr-0001-scene-management-architecture.md
    signal_signature: "ViewLayerManager.RequestReturnToStarMap()"
    referenced_by:
      - docs/architecture/adr-0001-scene-management-architecture.md
    added: 2026-04-14
    revised: ""

  - contract: tier1_so_channel
    status: active
    pattern: event_bus  # ScriptableObject Channel
    producer: any-cross-scene-system
    consumers:
      - any-cross-scene-system
    adr: docs/architecture/adr-0002-event-communication-architecture.md
    signal_signature: "ScriptableObject Channel — 三问法 Q1 YES: 生产者和消费者在不同 Unity 场景时强制使用"
    notes: "跨场景通信唯一合法机制。SO Channel 资产存放于 assets/data/channels/。命名规则: [ProducerSystem]Channel.cs。注册的 SO Channels: ViewLayerChannel, CombatChannel, ColonyShipChannel, ShipStateChannel。"
    referenced_by:
      - docs/architecture/adr-0001-scene-management-architecture.md
      - docs/architecture/adr-0002-event-communication-architecture.md
    added: 2026-04-14
    revised: ""

  - contract: tier2_csharp_event
    status: active
    pattern: signal  # C# event Action<T>
    producer: any-same-scene-system
    consumers:
      - any-same-scene-system
    adr: docs/architecture/adr-0002-event-communication-architecture.md
    signal_signature: "public event Action<T> OnXxx — 三问法 Q2 YES: 同场景不同系统时使用"
    notes: "同场景跨系统通信标准模式。订阅必须在 OnEnable() 进行，取消订阅必须在 OnDisable() 进行（强制约束）。禁止 Awake/OnDestroy 配对。"
    referenced_by:
      - docs/architecture/adr-0002-event-communication-architecture.md
    added: 2026-04-14
    revised: ""

  - contract: combat_channel_timing
    status: active
    pattern: event_bus  # CombatChannel SO
    producer: CombatSystem  # CockpitScene
    consumers:
      - StarMapSystem   # StarMapScene
      - ShipHUD         # CockpitScene
    adr: docs/architecture/adr-0002-event-communication-architecture.md
    signal_signature: "CombatChannel.RaiseBegin() — 必须在 SceneManager.sceneLoaded 回调中调用（CockpitScene 完全加载后）"
    notes: "防止 ShipHUD 等消费者尚未完成 OnEnable 订阅时错过 OnCombatBegin 事件。违反此约束导致首次战斗 HUD 不响应。"
    referenced_by:
      - docs/architecture/adr-0002-event-communication-architecture.md
    added: 2026-04-14
    revised: ""

  - contract: combat_health_integration
    status: active
    pattern: direct_call
    producer: HealthSystem
    consumers:
      - CombatSystem
      - EnemySystem
    adr: docs/architecture/adr-0014-health-system-architecture.md
    signal_signature: "HealthSystem.ApplyDamage(instanceId: string, rawDamage: float, damageType: DamageType) — 驾驶舱战斗伤害唯一入口；HealthSystem.OnShipDying — 死亡事件，CombatSystem 订阅以检测胜负"
    notes: "U-4 规则（无人值守失败）绕过 HealthSystem，直接调用 ShipDataModel.Destroy()。HealthSystem 内部不区分来源，只负责 Hull 追踪。"
    referenced_by:
      - docs/architecture/adr-0013-combat-system-architecture.md
      - docs/architecture/adr-0014-health-system-architecture.md
    added: 2026-04-15
    revised: ""

  - contract: combat_enemy_spawn
    status: active
    pattern: direct_call
    producer: CombatSystem
    consumers:
      - EnemySystem
    adr: docs/architecture/adr-0013-combat-system-architecture.md
    signal_signature: "EnemySystem.SpawnEnemy(blueprintId: string, position: Vector3) — 战斗开始时生成 2 个敌方实例；EnemySystem.DespawnEnemy(instanceId: string) — 战斗结束时销毁所有敌方"
    notes: "敌人生成位置在 EnemySystem 内按 E-3 规则计算（相对玩家位置圆弧分布）。MVP 固定 2 个实例。"
    referenced_by:
      - docs/architecture/adr-0013-combat-system-architecture.md
      - docs/architecture/adr-0015-enemy-system-architecture.md
    added: 2026-04-15
    revised: ""

  - contract: enemy_ai_lifecycle
    status: active
    pattern: event_bus  # C# event Tier 2（同场景）
    producer: HealthSystem
    consumers:
      - EnemySystem
    adr: docs/architecture/adr-0015-enemy-system-architecture.md
    signal_signature: "HealthSystem.OnShipDying(instanceId) — 敌方飞船死亡时，EnemySystem 订阅以触发 DYING 状态进入"
    notes: "EnemySystem 通过 HealthSystem.OnShipDying 检测敌方死亡，进入 DYING 状态并开始 1.2s 销毁计时。"
    referenced_by:
      - docs/architecture/adr-0015-enemy-system-architecture.md
    added: 2026-04-15
    revised: ""

  - contract: combat_weapon_trigger
    status: active
    pattern: signal
    producer: CombatSystem
    consumers:
      - EnemySystem  # 敌方武器射速计时（相同逻辑）
    adr: docs/architecture/adr-0013-combat-system-architecture.md
    signal_signature: "FireRequested(playerShipId, enemyInstanceId) — 满足 aim_angle ≤ FIRE_ANGLE_THRESHOLD 时触发；AimAngleProvider.aimAngle (read-only float) — 由 ShipControlSystem 计算并暴露"
    notes: "武器自动开火，无手动射击按钮。aimAngle 归属 ShipControlSystem（ADR-0003），本接口只约束 CombatSystem 如何消费此值。"
    referenced_by:
      - docs/architecture/adr-0013-combat-system-architecture.md
    added: 2026-04-15
    revised: ""

  - contract: fleet_dispatch_lifecycle
    status: active
    pattern: direct_call
    producer: FleetDispatchSystem
    consumers:
      - ShipDataModel
      - CombatSystem
      - StarMapSystem
    adr: docs/architecture/adr-0017-fleet-dispatch-architecture.md
    signal_signature: "FleetDispatchSystem.RequestDispatch(shipId, destNodeId) — 创建 DispatchOrder，飞船 SetState(IN_TRANSIT)；CancelDispatch(shipId) — 取消订单，返回原节点；ArrivedAtDestination — 触发 SetState(DOCKED) 或 CombatSystem.BeginCombat()；U-4 路径：ShipDataModel.Destroy() 直接调用"
    notes: "Transit 期间 DispatchOrder 在 StarMapScene 继续推进（不随 CockpitScene 卸载而暂停）。ShipDataModel.Destroy() 被调用时，FleetDispatchSystem.OnShipDestroyed() 清理孤立订单。"
    referenced_by:
      - docs/architecture/adr-0017-fleet-dispatch-architecture.md
    added: 2026-04-15
    revised: ""

