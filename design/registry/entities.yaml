# Game World Entity Registry
#
# PURPOSE: Single source of truth for all named game-world facts that appear
# in more than one document. Skills check this before writing new content to
# detect cross-doc inconsistencies at authoring time.
#
# RULES:
#   - Only register facts that cross system boundaries. Internal-only facts
#     (a formula used in one GDD only) do NOT need to be registered.
#   - Never delete entries — set status: deprecated instead.
#   - When a value changes: update the value, set revised: to today's date,
#     and add a comment with the old value and which GDD changed it.
#   - source: is the authoritative GDD — the one that "owns" this fact.
#     Other GDDs that reference it list themselves in referenced_by.
#   - When a new GDD references an existing entry, append its path to
#     referenced_by. Do not create a duplicate entry.
#
# WRITTEN BY: /design-system (Phase 5 — after GDD sections are approved)
#             /consistency-check (when resolving conflicts)
# READ BY:    /design-system (Phase 2 — before authoring begins, and after
#               Section C/D writes to conflict-check new entities/formulas)
#             /consistency-check (primary input — grep-first, GDD-second)
#             /review-all-gdds (Phase 1 — baseline for Phase 2 checks)
#             /architecture-review (data structure and interface validation)
#
# SEARCH PATTERNS (for skills using Grep):
#   All entity names:        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   Specific entity:         Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   All items:               Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   What combat.md owns:     Grep pattern="source: design/gdd/combat.md"
#   What inventory.md uses:  Grep pattern="referenced_by.*inventory"
#   All gold values:          Grep pattern="value_gold:"
#   Deprecated entries:      Grep pattern="status: deprecated"
#
# FORMAT: YAML. Consistent indentation is critical for grep reliability.
#   Sections: entities | items | formulas | constants
#   Each entry: name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: "2026-04-13"

# ─── ENTITIES ────────────────────────────────────────────────────────────────
# Named game-world objects: enemies, NPCs, characters, factions, bosses.
# Register an entity here when it appears in more than one GDD — e.g., an
# enemy defined in combat.md that also drops items listed in inventory.md.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: any key stats that could appear in another GDD
#   (health, damage, drops, faction, etc.)

entities: []

# Example (remove when first real entry is added):
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # must match an entry in items section
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── ITEMS ───────────────────────────────────────────────────────────────────
# Named collectables, equipment, consumables, crafting materials, currency.
# Register an item when its name or value appears in more than one GDD.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: value_gold, weight, stackable, category, and any stat
#   modifiers that another system (e.g., economy, crafting) might reference.

items: []

# Example:
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # drop defined in combat GDD
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD lists its weight/stack rules
#       - design/gdd/economy.md      # economy GDD references its sell price
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: net_ore_production
    status: active
    source: design/gdd/resource-system.md
    referenced_by:
      - design/gdd/resource-system.md
      - design/gdd/building-system.md
      - design/gdd/colony-system.md
    variables:
      - mine_count
      - ORE_PER_MINE
    output_range: [0, "∞ (clamped by ORE_CAP)"]
    expression: "mine_count × ORE_PER_MINE"
    added: 2026-04-12
    revised: ""

  - name: net_energy_production
    status: active
    source: design/gdd/resource-system.md
    referenced_by:
      - design/gdd/resource-system.md
      - design/gdd/building-system.md
      - design/gdd/colony-system.md
    variables:
      - COLONY_BASE_ENERGY
      - mine_count
      - ENERGY_PER_MINE
      - shipyard_count
      - ENERGY_PER_SHIPYARD
    output_range: ["-∞", "+∞"]
    expression: "COLONY_BASE_ENERGY + (mine_count × ENERGY_PER_MINE) + (shipyard_count × ENERGY_PER_SHIPYARD)"
    notes: "Negative output triggers HUD warning only (no penalty in MVP)"
    added: 2026-04-12
    revised: ""

  - name: can_afford
    status: active
    source: design/gdd/resource-system.md
    referenced_by:
      - design/gdd/resource-system.md
      - design/gdd/building-system.md
      - design/gdd/colony-system.md
    variables:
      - ore_current
      - energy_current
      - ore_cost
      - energy_cost
    output_range: ["false", "true"]
    expression: "(ore_current >= ore_cost) AND (energy_current >= energy_cost)"
    added: 2026-04-12
    revised: ""

  - name: time_to_afford
    status: active
    source: design/gdd/resource-system.md
    referenced_by:
      - design/gdd/resource-system.md
    variables:
      - ore_deficit
      - energy_deficit
      - net_ore_production
      - net_energy_production
    output_range: [0, "∞"]
    expression: "max(ore_deficit/net_ore_production, energy_deficit/net_energy_production)"
    notes: "Returns Infinity if net production <= 0 and deficit > 0 (no divide-by-zero)"
    added: 2026-04-12
    revised: ""

  - name: IsVisible
    status: active
    source: design/gdd/star-map-system.md
    referenced_by:
      - design/gdd/star-map-system.md
    variables:
      - n           # target StarNode
      - P           # set of all PLAYER-owned StarNodes
      - GraphDistance
      - VISION_RADIUS
    output_range: [false, true]
    expression: "∃p ∈ P : GraphDistance(p, n) ≤ VISION_RADIUS"
    notes: "true → fogState=VISIBLE; false + was-ever-visible → EXPLORED; never-visible → UNEXPLORED"
    added: 2026-04-12
    revised: ""

  - name: GetOreMultiplier
    status: active
    source: design/gdd/star-map-system.md
    referenced_by:
      - design/gdd/star-map-system.md
      - design/gdd/building-system.md
    variables:
      - nodeType    # HOME_BASE | STANDARD | RICH
      - RICH_NODE_ORE_MULTIPLIER
    output_range: [1.0, "RICH_NODE_ORE_MULTIPLIER"]
    expression: "RICH_NODE_ORE_MULTIPLIER if nodeType=RICH, else 1.0"
    notes: "Output multiplied against net_ore_production by the colony system"
    added: 2026-04-12
    revised: ""

  - name: is_valid_ship_instance
    status: active
    source: design/gdd/ship-system.md
    referenced_by:
      - design/gdd/ship-system.md
      - design/gdd/ship-health-system.md
    variables:
      - ship.MaxHull       # float, must be > 0
      - ship.ThrustPower   # float, must be > 0
      - ship.TurnSpeed     # float, must be > 0
      - ship.WeaponSlots   # int, must be >= 0
    output_range: [false, true]
    expression: "(MaxHull > 0) AND (ThrustPower > 0) AND (TurnSpeed > 0) AND (WeaponSlots >= 0)"
    notes: "Data integrity guard — called before any ShipInstance is created; false = reject creation"
    added: 2026-04-12
    revised: ""

  - name: node_ore_output
    status: active
    source: design/gdd/building-system.md
    referenced_by:
      - design/gdd/building-system.md
      - design/gdd/colony-system.md
    variables:
      - mine_count       # int，该节点 BasicMine 建筑数量
      - ORE_PER_MINE     # int，固定 10，来自资源系统
      - GetOreMultiplier # float，1.0–RICH_NODE_ORE_MULTIPLIER，来自星图系统
    output_range: [0, "∞ (实际受 ORE_CAP 截断)"]
    expression: "mine_count × ORE_PER_MINE × GetOreMultiplier(nodeId)"
    notes: "节点矿石产出公式，合并矿场数量和节点类型乘数；RICH节点产出是STANDARD节点RICH_NODE_ORE_MULTIPLIER倍；由殖民地系统每tick调用GetNodeProductionDelta消费"
    added: 2026-04-12
    revised: ""

  - name: weapon_damage
    status: active
    source: design/gdd/ship-health-system.md
    referenced_by:
      - design/gdd/ship-health-system.md
      - design/gdd/ship-combat-system.md
    variables:
      - BASE_DAMAGE     # float, 武器配置中定义的固定伤害值；MVP 推荐值 8
      - ACCURACY_COEFF  # float, 命中精度修正系数；MVP 固定 1.0
    output_range: [0.0, 10.0]
    expression: "BASE_DAMAGE × ACCURACY_COEFF"
    notes: "武器命中伤害公式；MVP 阶段 ACCURACY_COEFF=1.0，输出等于 BASE_DAMAGE；输出作为 apply_damage 的 finalDamage 输入；飞船战斗系统 GDD 完成后需加入 referenced_by"
    added: 2026-04-12
    revised: ""

  - name: collision_damage
    status: active
    source: design/gdd/ship-health-system.md
    referenced_by:
      - design/gdd/ship-health-system.md
    variables:
      - COLLISION_COEFF   # float, 速度平方映射伤害的缩放系数；推荐值 0.02
      - relative_speed    # float, 碰撞相对速度 m/s，由 Unity Physics 提供
      - COLLISION_MIN     # float, 最低碰撞伤害；推荐值 1.0
      - COLLISION_MAX     # float, 最高碰撞伤害；推荐值 10.0（MaxHull×0.10）
    output_range: [1.0, 10.0]
    expression: "clamp(COLLISION_COEFF × relative_speed², COLLISION_MIN, COLLISION_MAX)"
    notes: "碰撞伤害公式；clamp 保证低速擦碰不会 0 伤害，高速碰撞不会一击致命；relative_speed < COLLISION_MIN_SPEED 时跳过计算"
    added: 2026-04-12
    revised: ""

  - name: health_ratio
    status: active
    source: design/gdd/ship-health-system.md
    referenced_by:
      - design/gdd/ship-health-system.md
      - design/gdd/star-map-ui.md
      - design/gdd/ship-hud.md
    variables:
      - CurrentHull  # float, 飞船当前剩余船体值
      - MaxHull      # float, 飞船最大船体值；MVP 值 100
    output_range: [0.0, 1.0]
    expression: "CurrentHull / MaxHull"
    notes: "生命值比率；供 HUD 和星图 UI 读取；阈值：>0.50=HEALTHY, 0.25–0.50=DAMAGED, 0–0.25=CRITICAL, ==0=DESTROYED；star-map-ui.md 和 ship-hud.md 已加入 referenced_by ✅"
    added: 2026-04-12
    revised: "2026-04-13"

  - name: apply_damage
    status: active
    source: design/gdd/ship-health-system.md
    referenced_by:
      - design/gdd/ship-health-system.md
      - design/gdd/ship-combat-system.md
      - design/gdd/enemy-system.md
    variables:
      - CurrentHull   # float, 受击前飞船当前船体值
      - finalDamage   # float, 本次伤害量；来源为 weapon_damage 或 collision_damage
      - MaxHull       # float, 飞船最大船体值；作为 Clamp 上界
    output_range: [0.0, "MaxHull"]
    expression: "Clamp(CurrentHull - finalDamage, 0, MaxHull)"
    notes: "核心伤害应用公式；唯一有权修改 CurrentHull 的计算路径；newHull <= 0 触发死亡序列（规则 H-5）；负 finalDamage 视为 0"
    added: 2026-04-12
    revised: ""

  - name: global_ore_production
    status: active
    source: design/gdd/colony-system.md
    referenced_by:
      - design/gdd/colony-system.md
    variables:
      - n                  # StarNode，所有 ownershipState == PLAYER 的节点
      - node_ore_output    # float，BuildingSystem.GetNodeProductionDelta(nodeId).orePerSec
    output_range: [0, "∞（实际受 ORE_CAP 截断于 tick_ore_update）"]
    expression: "Σ node_ore_output(n)  for all n where n.ownershipState == PLAYER"
    notes: "全局矿石净产出；每 tick T-3 重新计算；缓存值暴露为 GetNetOreRate()"
    added: 2026-04-12
    revised: ""

  - name: global_energy_production
    status: active
    source: design/gdd/colony-system.md
    referenced_by:
      - design/gdd/colony-system.md
    variables:
      - n                    # StarNode，所有 ownershipState == PLAYER 的节点
      - node_energy_delta    # float，BuildingSystem.GetNodeProductionDelta(nodeId).energyPerSec；可为负
    output_range: ["-∞", "+∞"]
    expression: "Σ node_energy_delta(n)  for all n where n.ownershipState == PLAYER"
    notes: "全局能源净产出；负值触发 HUD 警告（MVP 无实际惩罚）；缓存值暴露为 GetNetEnergyRate()"

  - name: aim_angle
    status: active
    source: design/gdd/ship-control-system.md
    referenced_by:
      - design/gdd/ship-control-system.md
      - design/gdd/ship-combat-system.md
    variables:
      - target.position   # Vector3, 软锁定目标的世界坐标
      - transform.position # Vector3, 飞船自身的世界坐标
      - transform.forward  # Vector3（单位向量）, 飞船当前朝向
    output_range: [0.0, 180.0]
    expression: "Vector3.Angle(transform.forward, normalize(target.position - transform.position))"
    notes: "飞船朝向与目标方向的夹角（degrees）；0° = 正对目标，180° = 背对目标；供自动开火规则（L-4）和软锁定激活规则（L-1）使用；飞船战斗系统 GDD 完成后需加入 referenced_by"
    added: 2026-04-12
    revised: ""

  - name: unattended_combat_result
    status: active
    source: design/gdd/ship-combat-system.md
    referenced_by:
      - design/gdd/ship-combat-system.md
    variables:
      - P   # int, 玩家舰队数量（飞船数）
      - E   # int, 敌方舰队数量（飞船数）
    output_range: ["VICTORY", "DEFEAT"]
    expression: "while P>0 and E>0: P-=1; E-=1; if E<=0 and P>0 → VICTORY else → DEFEAT"
    notes: "无人值守战斗结算公式；每轮双方各损失 1 艘；平局（P=E 同时归零）判 DEFEAT（保守设计）；结算在单帧内同步完成"
    added: 2026-04-12
    revised: ""

  - name: enemy_fire_rate_timer
    status: active
    source: design/gdd/ship-combat-system.md
    referenced_by:
      - design/gdd/ship-combat-system.md
    variables:
      - _fireTimer         # float, 累积计时器（秒）
      - WEAPON_FIRE_RATE   # float, 武器射速（发/秒）
      - Time.deltaTime     # float, Unity 帧时间
    output_range: [0.0, "1f/WEAPON_FIRE_RATE"]
    expression: "_fireTimer += Time.deltaTime; if _fireTimer >= (1f/WEAPON_FIRE_RATE): fire(); _fireTimer = 0f"
    notes: "武器射速计时器；帧率无关；同时适用于玩家飞船和敌方飞船；WEAPON_FIRE_RATE=0 时 clamp 至 0.1f 防止除零"
    added: 2026-04-12
    revised: ""

